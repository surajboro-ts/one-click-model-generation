<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#F6F8FA"/>

  <!-- Main card -->
  <rect x="100" y="80" width="600" height="250" rx="12" fill="white" stroke="#E8EAED" stroke-width="1"/>

  <!-- Header bar -->
  <rect x="100" y="80" width="600" height="60" rx="12" fill="#FFFFFF" stroke="#E8EAED" stroke-width="1"/>
  <rect x="100" y="80" width="600" height="60" rx="12" fill="#F3E8FF" opacity="0.4"/>

  <!-- Icon -->
  <circle cx="135" cy="110" r="18" fill="#7C3AED" opacity="0.1"/>
  <text x="135" y="115" font-size="24" text-anchor="middle" font-family="system-ui">⚡</text>

  <!-- Title in header -->
  <text x="165" y="130" font-size="16" font-weight="600" fill="#1D232F" font-family="system-ui">
    1-Click Model Generation
  </text>

  <!-- Content area - tables representation -->
  <g>
    <!-- Left sidebar -->
    <rect x="115" y="155" width="120" height="150" rx="8" fill="#F3F4F6"/>
    <text x="125" y="175" font-size="11" font-weight="600" fill="#6B7280" font-family="system-ui" text-transform="uppercase">
      Tables
    </text>
    <rect x="125" y="190" width="100" height="28" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <text x="130" y="210" font-size="12" font-weight="500" fill="#1F2937" font-family="system-ui">customers</text>

    <rect x="125" y="225" width="100" height="28" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <text x="130" y="245" font-size="12" font-weight="500" fill="#1F2937" font-family="system-ui">orders</text>
  </g>

  <!-- Right area - schema representation -->
  <g>
    <!-- Schema boxes -->
    <rect x="275" y="155" width="160" height="70" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
    <text x="285" y="175" font-size="12" font-weight="600" fill="#1F2937" font-family="system-ui">Customer Table</text>
    <text x="285" y="195" font-size="11" fill="#6B7280" font-family="system-ui">• customer_id</text>
    <text x="285" y="210" font-size="11" fill="#6B7280" font-family="system-ui">• email, phone</text>

    <rect x="465" y="155" width="160" height="70" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
    <text x="475" y="175" font-size="12" font-weight="600" fill="#1F2937" font-family="system-ui">Order Table</text>
    <text x="475" y="195" font-size="11" fill="#6B7280" font-family="system-ui">• order_id</text>
    <text x="475" y="210" font-size="11" fill="#6B7280" font-family="system-ui">• customer_id, date</text>

    <!-- Relationship line -->
    <line x1="435" y1="195" x2="465" y2="195" stroke="#7C3AED" stroke-width="2" stroke-dasharray="4"/>
  </g>

  <!-- AI badge -->
  <rect x="275" y="245" width="350" height="40" rx="8" fill="#F0F9FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="290" y="262" font-size="11" font-weight="600" fill="#0369A1" font-family="system-ui">✨ AI-powered schema generation</text>
  <text x="290" y="276" font-size="10" fill="#0284C7" font-family="system-ui">Automatic relationships • Smart suggestions</text>

  <!-- Title below -->
  <text x="400" y="420" fill="#1D232F" font-family="system-ui" font-size="18" text-anchor="middle" font-weight="500">
    1-Click Model Generation
  </text>
</svg>
