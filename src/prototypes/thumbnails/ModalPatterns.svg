<svg width="320" height="180" viewBox="0 0 320 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="320" height="180" fill="#F6F8FA"/>
  
  <!-- Modal Backdrop Overlay -->
  <rect x="20" y="20" width="280" height="140" rx="4" fill="#1D232F" opacity="0.3"/>
  
  <!-- Modal Container -->
  <rect x="60" y="35" width="200" height="110" rx="6" fill="white" filter="url(#shadow)"/>
  
  <!-- Modal Header -->
  <rect x="60" y="35" width="200" height="32" fill="white"/>
  <line x1="60" y1="67" x2="260" y2="67" stroke="#EAEDF2"/>
  <text x="72" y="55" fill="#1D232F" font-family="Arial" font-size="11" font-weight="600">Modal Title</text>
  <circle cx="248" cy="51" r="8" fill="#F6F8FA"/>
  <path d="M244 47L252 55M252 47L244 55" stroke="#777E8B" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Modal Content -->
  <rect x="72" y="75" width="176" height="30" rx="4" fill="#F0EBFF"/>
  <text x="160" y="94" fill="#777E8B" font-family="Arial" font-size="8" text-anchor="middle">Content Area</text>
  
  <!-- Modal Footer -->
  <rect x="60" y="113" width="200" height="32" rx="0 0 6 6" fill="#F6F8FA"/>
  <line x1="60" y1="113" x2="260" y2="113" stroke="#EAEDF2"/>
  
  <!-- Cancel Button -->
  <rect x="180" y="120" width="32" height="18" rx="9" fill="#EAEDF2"/>
  <text x="196" y="132" fill="#1D232F" font-family="Arial" font-size="7" text-anchor="middle">Cancel</text>
  
  <!-- Primary Button -->
  <rect x="218" y="120" width="32" height="18" rx="9" fill="#2770EF"/>
  <text x="234" y="132" fill="white" font-family="Arial" font-size="7" text-anchor="middle">Action</text>
  
  <!-- Size Labels -->
  <text x="40" y="170" fill="#777E8B" font-family="Arial" font-size="8">M1</text>
  <text x="100" y="170" fill="#777E8B" font-family="Arial" font-size="8">M2</text>
  <text x="160" y="170" fill="#777E8B" font-family="Arial" font-size="8">M3</text>
  <text x="220" y="170" fill="#777E8B" font-family="Arial" font-size="8">M4</text>
  
  <!-- Size Indicator Dots -->
  <circle cx="50" cy="170" r="3" fill="#EAEDF2"/>
  <circle cx="110" cy="170" r="3" fill="#2770EF"/>
  <circle cx="170" cy="170" r="3" fill="#EAEDF2"/>
  <circle cx="230" cy="170" r="3" fill="#EAEDF2"/>
  
  <!-- Shadow Filter -->
  <defs>
    <filter id="shadow" x="-4" y="-4" width="208" height="118" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#192331" flood-opacity="0.16"/>
    </filter>
  </defs>
</svg>
