  <rect x="282" y="25" width="8" height="8" rx="4" fill="#2770EF"/>
  <rect x="298" y="27" width="120" height="8" rx="3" fill="#2770EF"/>
  <rect x="426" y="27" width="60" height="8" rx="3" fill="#A5ACB9"/>
