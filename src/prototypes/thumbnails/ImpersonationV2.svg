  <rect x="6" y="58" width="788" height="386" fill="#F6F8FA"/>
  <!-- Content placeholder rows -->
  <rect x="30" y="80" width="740" height="40" rx="6" fill="white"/>
  <rect x="50" y="92" width="200" height="12" rx="4" fill="#EAEDF2"/>
  <rect x="30" y="130" width="740" height="40" rx="6" fill="white"/>
  <rect x="50" y="142" width="160" height="12" rx="4" fill="#EAEDF2"/>
  <rect x="30" y="180" width="740" height="40" rx="6" fill="white"/>
  <rect x="50" y="192" width="220" height="12" rx="4" fill="#EAEDF2"/>
  <!-- Session popup modal -->
  <rect x="530" y="220" width="220" height="130" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="530" y="220" width="220" height="130" rx="10" fill="white"/>
  <rect x="530" y="220" width="220" height="130" rx="10" stroke="#EAEDF2" stroke-width="1"/>
  <rect x="548" y="238" width="90" height="10" rx="3" fill="#1D232F"/>
  <rect x="548" y="256" width="140" height="8" rx="3" fill="#A5ACB9"/>
  <rect x="548" y="272" width="110" height="8" rx="3" fill="#A5ACB9"/>
