  <rect x="0" y="0" width="6" height="450" fill="#2770EF"/>
  <rect x="794" y="0" width="6" height="450" fill="#2770EF"/>
  <!-- Header -->
  <rect x="6" y="6" width="788" height="52" fill="white"/>
  <rect x="24" y="22" width="100" height="14" rx="4" fill="#EAEDF2"/>
