  <rect x="556" y="298" width="60" height="12" rx="3" fill="#2770EF"/>
  <!-- End session button -->
  <rect x="638" y="292" width="94" height="24" rx="6" fill="#E22B3D" fill-opacity="0.1"/>
  <rect x="650" y="298" width="70" height="12" rx="3" fill="#E22B3D"/>
  <!-- Toast notification -->
  <rect x="580" y="380" width="190" height="40" rx="8" fill="#1D232F"/>
  <rect x="596" y="392" width="100" height="8" rx="3" fill="white"/>
  <rect x="596" y="404" width="70" height="6" rx="3" fill="#A5ACB9"/>
  <text x="400" y="435" fill="#A5ACB9" font-family="system-ui" font-size="13" text-anchor="middle" font-weight="400">Admin Impersonation</text>
